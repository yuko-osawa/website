title: "Yuko Osawa"
description: "Vocal Coach – Collaborative Pianist | Paris"
baseurl: ""
url: ""

theme: minima

plugins:
  - jekyll-polyglot

# Multilingual config
languages: ["fr", "en", "ja"]
default_lang: "fr"
exclude_from_localizations:
  - assets
  - images
  - _data

# Tell Jekyll to process _pages/
include:
  - _pages

# Minima navbar — list the page files you want to appear
header_pages:
  - _pages/index.html
  - _pages/agenda.html

# Jekyll settings
markdown: kramdown
permalink: pretty

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package.json
  - package-lock.json
  - docker-compose.yml
  - Dockerfile.jekyll
  - Makefile
  - scripts/
  - "*.csv"
  - .env
  - .env.example
  - SETUP_GUIDE.md
  - sheets.yml
  - CLAUDE.md
  - IMPROVEMENT_IDEAS.md
