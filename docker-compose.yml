services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile.jekyll
    ports:
      - "4000:4000"
      - "35729:35729"  # livereload
    volumes:
      - .:/site
      - bundle_cache:/usr/local/bundle
    env_file:
      - .env
    environment:
      - JEKYLL_ENV=development
      - SHEETS_CONFIG=sheets.yml

  # One-off service: download CSVs then convert to YAML
  # Usage: docker compose run --rm sheets
  sheets:
    build:
      context: .
      dockerfile: Dockerfile.jekyll
    volumes:
      - .:/site
    env_file:
      - .env
    environment:
      - SHEETS_CONFIG=sheets.yml
    command: sh -c "node .github/scripts/download-csvs.js && node .github/scripts/csv-to-yaml.js"

volumes:
  bundle_cache:
