name: Deploy site from Google Sheets

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Download CSVs from Google Sheets
        run: node .github/scripts/download-csvs.js
        env:
          SHEETS_CONFIG: sheets.yml
          SHEET_AGENDA_URL: ${{ secrets.SHEET_AGENDA_URL }}
          SHEET_PROJECTS_URL: ${{ secrets.SHEET_PROJECTS_URL }}
          SHEET_META_URL: ${{ secrets.SHEET_META_URL }}

      - name: Convert CSVs to YAML
        run: node .github/scripts/csv-to-yaml.js

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
